<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2R MerchantMaster — Item Value Checker</title>
    <meta name="description" content="Check D2R item values in Ist and Jah runes using real-time forum gold prices">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --bg3: #1a1a28;
            --card: #16162266;
            --border: #2a2a3a;
            --gold: #d4a84b;
            --gold2: #f0c060;
            --red: #8b1a1a;
            --red2: #c0392b;
            --text: #e0dcd0;
            --text2: #a09880;
            --ist: #4ecdc4;
            --jah: #ff6b6b;
            --glow: rgba(212, 168, 75, 0.15)
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1
        }

        header {
            text-align: center;
            padding: 40px 0 30px
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--gold2), #fff8e0, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(212, 168, 75, 0.3);
            letter-spacing: 2px
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text2);
            margin-top: 8px;
            letter-spacing: 1px
        }

        .mode-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(212, 168, 75, 0.05)
        }

        .search-wrap {
            position: relative;
            margin: 30px 0 20px
        }

        #searchInput {
            width: 100%;
            padding: 16px 20px 16px 48px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s
        }

        #searchInput:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--glow)
        }

        #searchInput::placeholder {
            color: #555
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
            font-size: 1.2rem
        }

        #catalogStatus {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text2);
            margin-bottom: 10px
        }

        #catalogStatus.error {
            color: var(--red2)
        }

        .results-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 10;
            display: none
        }

        .results-dropdown.show {
            display: block
        }

        .result-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(42, 42, 58, 0.5)
        }

        .result-item:hover {
            background: rgba(212, 168, 75, 0.08)
        }

        .result-item:last-child {
            border-bottom: none
        }

        .result-name {
            font-size: 0.95rem;
            color: var(--text)
        }

        .result-cat {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600
        }

        .cat-unique {
            background: rgba(212, 168, 75, 0.15);
            color: var(--gold)
        }

        .cat-set {
            background: rgba(78, 205, 196, 0.15);
            color: var(--ist)
        }

        .cat-runeword {
            background: rgba(255, 107, 107, 0.15);
            color: var(--jah)
        }

        .cat-rune {
            background: rgba(160, 100, 255, 0.15);
            color: #a064ff
        }

        .cat-misc {
            background: rgba(100, 220, 180, 0.15);
            color: #64dcb4
        }

        .price-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-top: 24px;
            display: none;
            animation: fadeIn 0.4s ease
        }

        .price-card.show {
            display: block
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .item-header {
            text-align: center;
            margin-bottom: 24px
        }

        .item-name {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--gold2);
            font-weight: 700
        }

        .item-type {
            font-size: 0.75rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px
        }

        .price-box {
            text-align: center;
            padding: 20px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.5)
        }

        .price-box.ist {
            border-color: rgba(78, 205, 196, 0.3);
            background: rgba(78, 205, 196, 0.03)
        }

        .price-box.jah {
            border-color: rgba(255, 107, 107, 0.3);
            background: rgba(255, 107, 107, 0.03)
        }

        .price-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text2);
            margin-bottom: 8px
        }

        .price-value {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700
        }

        .price-value.ist-val {
            color: var(--ist)
        }

        .price-value.jah-val {
            color: var(--jah)
        }

        .fg-section {
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            background: rgba(212, 168, 75, 0.04);
            border: 1px solid rgba(212, 168, 75, 0.15)
        }

        .fg-label {
            font-size: 0.7rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 2px
        }

        .fg-value {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 600;
            margin-top: 4px
        }

        .rates-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            font-size: 0.72rem;
            color: var(--text2)
        }

        .rates-bar span {
            opacity: 0.7
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text2)
        }

        .loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .error-msg {
            text-align: center;
            padding: 20px;
            color: var(--red2);
            font-size: 0.9rem
        }

        .primary-rune {
            text-align: center;
            margin-bottom: 16px
        }

        .primary-rune .price-value {
            font-size: 2.8rem
        }

        .primary-rune .price-label {
            font-size: 0.8rem;
            margin-bottom: 4px
        }

        .results-dropdown::-webkit-scrollbar {
            width: 6px
        }

        .results-dropdown::-webkit-scrollbar-track {
            background: var(--bg2)
        }

        .results-dropdown::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        footer {
            text-align: center;
            padding: 30px 0;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px
        }
    </style>
</head>

<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <header>
            <h1>MerchantMaster</h1>
            <div class="subtitle">Diablo II: Resurrected — Item Value Checker</div>
            <div class="mode-badge">Non-Ladder · Softcore · PC</div>
        </header>
        <div id="catalogStatus">Loading item catalog...</div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search for an item... (e.g. Enigma, Grief, Jah)"
                autocomplete="off" disabled>
            <div class="results-dropdown" id="dropdown"></div>
        </div>
        <div id="priceCard" class="price-card"></div>
        <footer id="footerInfo">Prices sourced from d2trader.net (d2jsp FG) · Updated in real-time</footer>
    </div>
    <script>
        // ── CORS PROXIES (fallback chain) ──
        const PROXIES = [
            u => 'https://corsproxy.io/?' + encodeURIComponent(u),
            u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
            u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
        ];
        const BASE = 'https://d2trader.net/';

        async function fetchWithProxy(targetUrl) {
            let lastErr;
            for (const mkUrl of PROXIES) {
                try {
                    const resp = await fetch(mkUrl(targetUrl));
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    return await resp.text();
                } catch (e) { lastErr = e; }
            }
            throw new Error('All proxies failed – ' + (lastErr?.message || 'unknown'));
        }

        // ── STATIC RUNES (different URL pattern than items) ──
        const RUNE_NAMES = ['El', 'Eld', 'Tir', 'Nef', 'Eth', 'Ith', 'Tal', 'Ral', 'Ort', 'Thul', 'Amn', 'Sol', 'Shael', 'Dol', 'Hel', 'Io', 'Lum', 'Ko', 'Fal', 'Lem', 'Pul', 'Um', 'Mal', 'Ist', 'Gul', 'Vex', 'Ohm', 'Lo', 'Sur', 'Ber', 'Jah', 'Cham', 'Zod'];
        const RUNES = RUNE_NAMES.map(r => ({
            n: r + ' Rune', c: 'rune', p: 'rune/' + r.toLowerCase() + '-price'
        }));

        // ── COMMON ALIASES for popular items ──
        const ALIASES = {
            'Harlequin Crest': ['shako'],
            'Annihilus': ['anni'],
            'Hellfire Torch': ['torch'],
            'Arachnid Mesh': ['arach', 'spider'],
            "Griffon's Eye": ['griffons', 'griffon'],
            'Crown of Ages': ['coa'],
            "Death's Fathom": ['dfathom', 'fathom'],
            "Death's Web": ['dweb'],
            "Mara's Kaleidoscope": ['maras'],
            'The Stone of Jordan': ['soj'],
            "Bul-Kathos' Wedding Band": ['bk ring', 'bk'],
            'War Traveler': ['travs', 'wt', 'war trav'],
            'Stormshield': ['ss'],
            "Andariel's Visage": ['andys', 'andy'],
            "Dracul's Grasp": ['dracs'],
            "Gheed's Fortune": ['gheeds'],
            'Skin of the Vipermagi': ['vmagi', 'viper'],
            "Titan's Revenge": ['titans'],
            'The Oculus': ['occy'],
            "Highlord's Wrath": ['highlords'],
            "Verdungo's Hearty Cord": ['verdungos'],
            'String of Ears': ['soe'],
            'Herald of Zakarum': ['hoz'],
            "Thundergod's Vigor": ['tgods'],
            'Chains of Honor': ['coh'],
            'Heart of the Oak': ['hoto'],
            'Call to Arms': ['cta'],
            'Breath of the Dying': ['botd'],
            'Hand of Justice': ['hoj'],
            "Nightwing's Veil": ['nightwing'],
            "Arreat's Face": ['arreats'],
            "The Reaper's Toll": ['reapers', 'reaper'],
            "Guillaume's Face": ['guillaumes', 'gface'],
            'Laying of Hands': ['loh'],
            "Jalal's Mane": ['jalals'],
            "Kira's Guardian": ['kiras'],
        };
        // ── SEASON 9: REIGN OF THE WARLOCK (d2jsp FG prices) ──
        // These items aren't on d2trader.net yet; FG values from d2jsp trades (March 2026)
        const ROTW_ITEMS = [
            // Weapons
            { n: "Dreadfang", c: "unique", fg: { min: 10, max: 150 }, src: "d2jsp", a: ["dreadfang"] },
            { n: "Bloodpact Shard", c: "unique", fg: { min: 20, max: 50 }, src: "d2jsp", a: ["bloodpact"] },
            // Grimoires (Warlock off-hands)
            { n: "Ars Al'Diabolos", c: "unique", fg: { min: 445, max: 1800 }, src: "d2jsp", a: ["ars al", "fire grimoire"] },
            { n: "Ars Tor'Baalos", c: "unique", fg: { min: 75, max: 1500 }, src: "d2jsp", a: ["ars tor", "summon grimoire"] },
            { n: "Ars Dul'Mephistos", c: "unique", fg: { min: 350, max: 5000 }, src: "d2jsp", a: ["ars dul", "magicka grimoire"] },
            { n: "Measured Wrath", c: "unique", fg: { min: 10, max: 50 }, src: "d2jsp", a: ["measured wrath"] },
            // Armor
            { n: "Wraithstep", c: "unique", fg: { min: 20, max: 50 }, src: "d2jsp", a: ["wraithstep", "mirrored boots"] },
            { n: "Hellwarden's Will", c: "unique", fg: { min: 15, max: 350 }, src: "d2jsp", a: ["hellwarden", "hellwardens"] },
            // Accessories
            { n: "Opalvein", c: "unique", fg: { min: 50, max: 300 }, src: "d2jsp", a: ["opalvein"] },
            { n: "Sling", c: "unique", fg: { min: 100, max: 500 }, src: "d2jsp", a: ["sling ring"] },
            { n: "Entropy Locket", c: "unique", fg: { min: 100, max: 200 }, src: "d2jsp", a: ["entropy locket", "entropy"] },
            { n: "Gheed's Wager", c: "unique", fg: { min: 300, max: 450 }, src: "d2jsp", a: ["gheeds wager", "wager"] },
            // New Runewords
            { n: "Coven", c: "runeword", fg: { min: 50, max: 200 }, src: "d2jsp", a: ["coven"] },
            { n: "Authority", c: "runeword", fg: { min: 100, max: 500 }, src: "d2jsp", a: ["authority"] },
            // Colossal Ancient Statues
            { n: "Talic's Anguish", c: "misc", fg: { min: 20, max: 40 }, src: "d2jsp", a: ["talic", "talics", "act1 statue"] },
            { n: "Korlic's Pain", c: "misc", fg: { min: 75, max: 300 }, src: "d2jsp", a: ["korlic", "korlics", "act2 statue"] },
            { n: "Madawc's Ire", c: "misc", fg: { min: 20, max: 70 }, src: "d2jsp", a: ["madawc", "madawcs", "act3 statue"] },
            { n: "Bul-Kathos' Nightmare", c: "misc", fg: { min: 10, max: 100 }, src: "d2jsp", a: ["bk nightmare", "bk statue", "act4 statue"] },
            { n: "Worusk's End", c: "misc", fg: { min: 30, max: 370 }, src: "d2jsp", a: ["worusk", "worusks", "act5 statue"] },
            // Token of Absolution
            { n: "Token of Absolution", c: "misc", fg: { min: 5, max: 15 }, src: "d2jsp", a: ["token", "respec", "absolution"] },
            // Worldstone Shards
            { n: "Western Worldstone Shard", c: "misc", fg: { min: 25, max: 80 }, src: "d2jsp", a: ["western shard", "act1 shard"] },
            { n: "Eastern Worldstone Shard", c: "misc", fg: { min: 25, max: 80 }, src: "d2jsp", a: ["eastern shard", "act2 shard"] },
            { n: "Southern Worldstone Shard", c: "misc", fg: { min: 25, max: 80 }, src: "d2jsp", a: ["southern shard", "act3 shard"] },
            { n: "Deep Worldstone Shard", c: "misc", fg: { min: 25, max: 80 }, src: "d2jsp", a: ["deep shard", "act4 shard"] },
            { n: "Northern Worldstone Shard", c: "misc", fg: { min: 40, max: 100 }, src: "d2jsp", a: ["northern shard", "act5 shard"] },
        ];

        // ── DYNAMIC CATALOG ──
        let ITEMS = [...RUNES, ...ROTW_ITEMS]; // Start with runes + Season 9, add d2trader items on load

        async function loadCatalog() {
            const statusEl = document.getElementById('catalogStatus');
            const searchEl = document.getElementById('searchInput');
            try {
                const html = await fetchWithProxy(BASE + 'item-prices');
                const m = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
                if (!m) throw new Error('Catalog not found');
                const data = JSON.parse(m[1]);
                const prices = data.props?.pageProps?.prices;
                if (!prices || !Array.isArray(prices)) throw new Error('No items in catalog');

                // Also fetch rune-prices page for rune data
                let runeItems = [];
                try {
                    const runeHtml = await fetchWithProxy(BASE + 'rune-prices');
                    const rm = runeHtml.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
                    if (rm) {
                        const rd = JSON.parse(rm[1]);
                        const rp = rd.props?.pageProps?.prices;
                        if (rp && Array.isArray(rp)) runeItems = rp;
                    }
                } catch (e) { /* rune page fetch failed, use static runes */ }

                // Build full item list
                const dynamicItems = prices.map(item => ({
                    n: item.item_name,
                    c: item.item_quality || 'unique',
                    p: item.item_slug.replace(/^\//, ''), // remove leading slash
                    a: ALIASES[item.item_name] || undefined,
                }));

                // Add runes from rune-prices page if available
                if (runeItems.length > 0) {
                    const runeDb = runeItems.map(r => ({
                        n: r.item_name,
                        c: 'rune',
                        p: r.item_slug.replace(/^\//, ''),
                    }));
                    ITEMS = [...ROTW_ITEMS, ...runeDb, ...dynamicItems];
                } else {
                    ITEMS = [...ROTW_ITEMS, ...RUNES, ...dynamicItems];
                }

                statusEl.textContent = ITEMS.length + ' items loaded';
                setTimeout(() => statusEl.style.opacity = '0', 2000);
                searchEl.disabled = false;
                searchEl.placeholder = 'Search for an item... (e.g. Enigma, Grief, Jah)';
            } catch (err) {
                statusEl.textContent = '⚠ Failed to load catalog: ' + err.message + '. Using built-in database.';
                statusEl.className = 'error';
                searchEl.disabled = false;
                // Keep RUNES as fallback
            }
        }

        // ── PRICE FETCHING ──
        async function fetchPagePrice(itemPath) {
            const html = await fetchWithProxy(BASE + itemPath);
            const m = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
            if (!m) throw new Error('Could not find price data');
            const data = JSON.parse(m[1]);
            const pp = data.props?.pageProps;
            if (!pp) throw new Error('No page props');
            // Direct path: pageProps.page.item_price.fg
            const fg = pp.page?.item_price?.fg;
            if (fg && (fg.min != null || fg.low != null)) {
                return { min: +(fg.min ?? fg.low), max: +(fg.max ?? fg.high) };
            }
            // Fallback: use the API with the item's hash ID
            const itemId = pp.page?.item_details?.item_id;
            if (itemId) {
                try {
                    const apiUrl = 'https://api.d2trader.net/v3/price?item_id=' + itemId +
                        '&upload_id=null&attr_ids=null&mode=softcore&platform=pc&ladder=0';
                    const apiText = await fetchWithProxy(apiUrl);
                    const apiData = JSON.parse(apiText);
                    if (apiData.fg && (apiData.fg.min != null || apiData.fg.low != null)) {
                        return { min: +(apiData.fg.min ?? apiData.fg.low), max: +(apiData.fg.max ?? apiData.fg.high) };
                    }
                } catch (e) { /* API fallback failed */ }
            }
            throw new Error('Price unavailable — low trade volume on non-ladder');
        }

        function formatRune(val, name) {
            if (val >= 100) return Math.round(val) + ' ' + name;
            if (val >= 10) return val.toFixed(1).replace(/\.0$/, '') + ' ' + name;
            if (val >= 1) return val.toFixed(1).replace(/\.0$/, '') + ' ' + name;
            if (val >= 0.1) return val.toFixed(2).replace(/0$/, '') + ' ' + name;
            return val.toFixed(2) + ' ' + name;
        }

        async function lookupPrice(item) {
            const card = document.getElementById('priceCard');
            card.className = 'price-card show';
            card.innerHTML = '<div class="loading"><div class="spinner"></div><div>Fetching real-time prices...</div></div>';
            try {
                const jahItem = ITEMS.find(i => i.n === 'Jah Rune');
                const istItem = ITEMS.find(i => i.n === 'Ist Rune');
                if (!jahItem || !istItem) throw new Error('Rune reference data not available');

                let itemPrice, jahPrice, istPrice, source;

                if (item.fg) {
                    // D2JSP embedded price — only fetch rune prices from d2trader
                    itemPrice = item.fg;
                    source = 'd2jsp';
                    [jahPrice, istPrice] = await Promise.all([
                        fetchPagePrice(jahItem.p),
                        fetchPagePrice(istItem.p)
                    ]);
                } else {
                    // D2trader.net price — fetch all three
                    source = 'd2trader';
                    [itemPrice, jahPrice, istPrice] = await Promise.all([
                        fetchPagePrice(item.p),
                        fetchPagePrice(jahItem.p),
                        fetchPagePrice(istItem.p)
                    ]);
                }

                // Median (midpoint of min/max)
                const itemMed = (itemPrice.min + itemPrice.max) / 2;
                const jahMed = (jahPrice.min + jahPrice.max) / 2;
                const istMed = (istPrice.min + istPrice.max) / 2;
                // Median rune values
                const inJah = jahMed > 0 ? itemMed / jahMed : 0;
                const inIst = istMed > 0 ? itemMed / istMed : 0;
                // Range rune values (low-end item / high-end rune, high-end item / low-end rune)
                const istLow = istMed > 0 ? itemPrice.min / istMed : 0;
                const istHigh = istMed > 0 ? itemPrice.max / istMed : 0;
                const jahLow = jahMed > 0 ? itemPrice.min / jahMed : 0;
                const jahHigh = jahMed > 0 ? itemPrice.max / jahMed : 0;
                let primaryVal, primaryLabel, primaryClass;
                if (inJah >= 0.8) {
                    primaryVal = formatRune(inJah, 'Jah');
                    primaryLabel = 'Median Value in Jah Runes';
                    primaryClass = 'jah-val';
                } else {
                    primaryVal = formatRune(inIst, 'Ist');
                    primaryLabel = 'Median Value in Ist Runes';
                    primaryClass = 'ist-val';
                }
                const fmtR = (v) => v >= 100 ? Math.round(v) : v >= 1 ? v.toFixed(1).replace(/\.0$/, '') : v.toFixed(2).replace(/0$/, '');
                const istRange = istLow === istHigh ? fmtR(istLow) : fmtR(istLow) + ' – ' + fmtR(istHigh);
                const jahRange = jahLow === jahHigh ? fmtR(jahLow) : fmtR(jahLow) + ' – ' + fmtR(jahHigh);
                const fgRange = itemPrice.min === itemPrice.max ? itemPrice.min + ' FG' : itemPrice.min + ' – ' + itemPrice.max + ' FG';
                const srcBadge = source === 'd2jsp'
                    ? '<div style="text-align:center;margin-top:6px;font-size:0.65rem;color:#a09880;letter-spacing:1px">📊 FG range from d2jsp trades · Rune rates from d2trader.net</div>'
                    : '';
                card.innerHTML = `
      <div class="item-header">
        <div class="item-name">${item.n}</div>
        <div class="item-type">${item.c}${source === 'd2jsp' ? ' · <span style="color:#f0c060">Season 9</span>' : ''}</div>
      </div>
      <div class="primary-rune">
        <div class="price-label">${primaryLabel}</div>
        <div class="price-value ${primaryClass}">${primaryVal}</div>
      </div>
      <div class="price-grid">
        <div class="price-box ist">
          <div class="price-label">In Ist Runes</div>
          <div class="price-value ist-val">${formatRune(inIst, '')}</div>
          <div style="font-size:0.65rem;color:#a09880;margin-top:4px">Range: ${istRange}</div>
        </div>
        <div class="price-box jah">
          <div class="price-label">In Jah Runes</div>
          <div class="price-value jah-val">${formatRune(inJah, '')}</div>
          <div style="font-size:0.65rem;color:#a09880;margin-top:4px">Range: ${jahRange}</div>
        </div>
      </div>
      <div class="fg-section">
        <div class="fg-label">Forum Gold (FG) Value</div>
        <div class="fg-value">${fmtR(itemMed)} FG</div>
        <div style="font-size:0.7rem;color:#a09880;margin-top:4px">Range: ${fgRange}</div>
      </div>
      <div class="rates-bar">
        <span>1 Jah = ${jahPrice.min}–${jahPrice.max} FG</span>
        <span>·</span>
        <span>1 Ist = ${istPrice.min}–${istPrice.max} FG</span>
      </div>
      <div style="text-align:center;margin-top:10px;font-size:0.7rem">
        ${source === 'd2jsp'
                        ? `<a href="https://forums.d2jsp.org/forum.php?f=268" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">🔗 Verify on d2jsp forums</a>`
                        : `<a href="https://d2trader.net/${item.p}" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">🔗 Verify on d2trader.net</a>`
                    }
        <span style="color:#555;margin:0 6px">·</span>
        <a href="https://d2trader.net/rune/jah-price" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">Jah price</a>
        <span style="color:#555;margin:0 6px">·</span>
        <a href="https://d2trader.net/rune/ist-price" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">Ist price</a>
      </div>
      ${srcBadge}`;
                // Update footer with real fetch timestamp
                const now = new Date();
                const ts = now.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
                document.getElementById('footerInfo').innerHTML = `Prices sourced from d2trader.net (d2jsp FG) · Last updated: ${ts}`;
            } catch (err) {
                card.innerHTML = `<div class="error-msg">⚠️ ${err.message}<br><small>Try again in a moment — the proxy may be rate-limited.</small></div>`;
            }
        }

        // ── SEARCH ──
        const input = document.getElementById('searchInput');
        const dropdown = document.getElementById('dropdown');

        function searchItems(query) {
            if (!query || query.length < 1) return [];
            const q = query.toLowerCase();
            return ITEMS.filter(item => {
                if (item.n.toLowerCase().includes(q)) return true;
                if (item.a && item.a.some(a => a.toLowerCase().includes(q))) return true;
                return false;
            }).slice(0, 15);
        }

        function renderDropdown(results) {
            if (results.length === 0) { dropdown.classList.remove('show'); return; }
            dropdown.innerHTML = results.map((item, i) =>
                `<div class="result-item" data-idx="${i}">
      <span class="result-name">${item.n}</span>
      <span class="result-cat cat-${item.c}">${item.c}</span>
    </div>`
            ).join('');
            dropdown.classList.add('show');
            dropdown.querySelectorAll('.result-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    input.value = results[idx].n;
                    dropdown.classList.remove('show');
                    lookupPrice(results[idx]);
                });
            });
        }

        input.addEventListener('input', () => renderDropdown(searchItems(input.value.trim())));
        input.addEventListener('keydown', (e) => { if (e.key === 'Escape') dropdown.classList.remove('show'); });
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) dropdown.classList.remove('show'); });

        // ── PARTICLES ──
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        for (let i = 0; i < 40; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5, speedY: -(Math.random() * 0.3 + 0.1),
                speedX: (Math.random() - 0.5) * 0.2, opacity: Math.random() * 0.4 + 0.1,
                color: Math.random() > 0.5 ? '212,168,75' : '200,60,40'
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speedY; p.x += p.speedX; p.opacity -= 0.001;
                if (p.y < 0 || p.opacity <= 0) {
                    p.y = canvas.height + 10; p.x = Math.random() * canvas.width;
                    p.opacity = Math.random() * 0.4 + 0.1;
                }
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color},${p.opacity})`; ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // ── INIT ──
        loadCatalog();
    </script>
</body>

</html>
