<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gheed's Price Checker — Item Value Checker</title>
    <meta name="description" content="Check D2R item values in Ist and Jah runes using real-time forum gold prices">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* Diablo 2 Gothic & Modern Rune Aesthetic */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Deeper D2 blacks and stone */
            --bg: #050508;
            --bg2: #0a0a0f;
            --bg3: #121216;

            /* D2 Item Colors */
            --unique-gold: #c7b377;
            --set-green: #00ff00;
            --rune-orange: #ffa800;
            --magic-blue: #4850b8;
            --rare-yellow: #ffff00;
            --crafted-orange: #ffa800;
            /* Same as rune for now */

            /* UI Elements */
            --card-bg: rgba(10, 10, 15, 0.85);
            --border-glow: rgba(199, 179, 119, 0.2);
            --border-dark: #2a2218;
            --text-main: #d0c8b0;
            --text-muted: #8a8270;

            /* High Runes */
            --ist-teal: #4ecdc4;
            --jah-coral: #ff6b6b;
            --fg-gold: #e6c875;

            /* Accents */
            --blood-red: #6e1010;
        }

        body {
            background-color: var(--bg);
            /* Subtle dark stone/leather grunge texture via radial gradients */
            background-image:
                radial-gradient(circle at 15% 50%, rgba(30, 20, 10, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(40, 10, 10, 0.1), transparent 25%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
            /* Dim the particles a bit to match the dark aesthetic */
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 20px 0 40px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffdc73 0%, #ff8c00 45%, #d32f2f 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 60, 0, 0.5));
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .mode-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 20px;
            border: 1px solid rgba(199, 179, 119, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(10, 8, 8, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(199, 179, 119, 0.05);
            backdrop-filter: blur(8px);
        }

        .search-wrap {
            position: relative;
            margin: 0 0 30px;
            z-index: 20;
        }

        .search-wrap.hidden {
            display: none;
        }

        .search-wrap.reveal {
            animation: fadeIn 0.6s ease;
        }

        #searchInput {
            width: 100%;
            padding: 18px 20px 18px 54px;
            background: rgba(12, 10, 10, 0.95);
            border: 1px solid rgba(199, 179, 119, 0.4);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 1.1rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(255, 140, 0, 0.05);
        }

        #searchInput:focus {
            border-color: rgba(255, 140, 0, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9), 0 0 25px rgba(255, 140, 0, 0.3), inset 0 0 10px rgba(255, 140, 0, 0.1);
        }

        #searchInput::placeholder {
            color: #5a5240;
        }

        .search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(199, 179, 119, 0.8);
            font-size: 1.3rem;
        }

        /* Gothic Scrollbar for Dropdown */
        .results-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: rgba(12, 10, 10, 0.98);
            border: 1px solid rgba(199, 179, 119, 0.3);
            border-radius: 16px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .results-dropdown.show {
            display: block;
        }

        .result-item {
            padding: 14px 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(42, 34, 24, 0.5);
            transition: background 0.1s;
        }

        .result-item:hover,
        .result-item.selected {
            background: rgba(199, 179, 119, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-name {
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .result-cat {
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid transparent;
        }

        /* D2 Color Categories */
        .name-unique {
            color: var(--unique-gold);
        }

        .name-set {
            color: var(--set-green);
        }

        .name-runeword {
            color: var(--unique-gold);
        }

        .name-rune {
            color: var(--rune-orange);
        }

        .name-charm {
            color: var(--magic-blue);
        }

        .name-misc {
            color: var(--text-main);
        }

        .name-material {
            color: var(--crafted-orange);
        }

        .cat-unique {
            border-color: rgba(199, 179, 119, 0.3);
            color: var(--unique-gold);
        }

        .cat-set {
            border-color: rgba(0, 255, 0, 0.3);
            color: var(--set-green);
        }

        .cat-runeword {
            border-color: rgba(199, 179, 119, 0.3);
            color: var(--unique-gold);
        }

        .cat-rune {
            border-color: rgba(255, 168, 0, 0.3);
            color: var(--rune-orange);
        }

        .cat-charm {
            border-color: rgba(72, 80, 184, 0.3);
            color: var(--magic-blue);
        }

        .cat-misc {
            border-color: rgba(208, 200, 176, 0.3);
            color: var(--text-main);
        }

        .cat-material {
            border-color: rgba(255, 168, 0, 0.3);
            color: var(--crafted-orange);
        }

        .price-card {
            background: rgba(12, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(199, 179, 119, 0.4);
            border-top: 1px solid rgba(255, 140, 0, 0.5);
            border-bottom: 1px solid rgba(255, 60, 0, 0.2);
            border-radius: 8px;
            padding: 40px;
            margin-top: 10px;
            display: none;
            position: relative;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255, 140, 0, 0.05);
        }

        /* Decorative Corners */
        .price-card::before,
        .price-card::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border: 1px solid rgba(199, 179, 119, 0.5);
        }

        .price-card::before {
            top: 5px;
            left: 5px;
            border-right: none;
            border-bottom: none;
        }

        .price-card::after {
            bottom: 5px;
            right: 5px;
            border-left: none;
            border-top: none;
        }

        .price-card.show {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            display: block;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .item-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .item-header::after {
            content: '';
            display: block;
            width: 150px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(199, 179, 119, 0.5), transparent);
            margin: 20px auto 0;
        }

        .item-name {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .item-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        .primary-rune {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(180deg, rgba(20, 20, 25, 0) 0%, rgba(20, 20, 25, 0.8) 50%, rgba(20, 20, 25, 0) 100%);
        }

        .primary-rune .price-value {
            font-size: 4rem;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .price-box {
            text-align: center;
            padding: 24px 16px;
            border-radius: 6px;
            border: 1px solid rgba(199, 179, 119, 0.15);
            background: rgba(10, 8, 8, 0.5);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 15px rgba(0, 0, 0, 0.5);
        }

        /* Subtle glowing top edge for rune boxes */
        .price-box.ist::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(78, 205, 196, 0.4);
        }

        .price-box.jah::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 107, 107, 0.4);
        }

        .price-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .price-value {
            font-family: 'Inter', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .price-value.ist-val {
            color: var(--ist-teal);
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.2);
        }

        .price-value.jah-val {
            color: var(--jah-coral);
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }

        .fg-section {
            text-align: center;
            padding: 24px;
            border-radius: 4px;
            background: rgba(10, 10, 12, 0.6);
            border: 1px solid #3a3225;
            position: relative;
        }

        .fg-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .fg-value {
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            color: var(--fg-gold);
            font-weight: 700;
            margin-top: 8px;
            letter-spacing: 0;
        }

        .rates-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Status & Loading */
        #catalogStatus {
            text-align: center;
            font-size: 0.75rem;
            color: var(--rune-orange);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #catalogStatus.error {
            color: var(--blood-red);
        }

        .catalog-loading {
            text-align: center;
            padding: 40px 0;
        }

        /* Gothic Spinner */
        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 2px solid #3a3225;
            border-top-color: var(--unique-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .load-text {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--unique-gold);
            letter-spacing: 2px;
        }

        .load-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }

        .error-msg {
            text-align: center;
            padding: 30px;
            color: var(--jah-coral);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
            border-left: 1px solid var(--border-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3225;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5a5245;
        }

        footer {
            text-align: center;
            padding: 40px 0 20px;
            font-size: 0.7rem;
            color: #5a5240;
            letter-spacing: 1.5px;
        }

        /* Utility Links */
        .links-bar a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            border-bottom: 1px solid transparent;
        }

        .links-bar a:hover {
            color: var(--unique-gold);
            border-bottom: 1px solid rgba(199, 179, 119, 0.4);
        }

        .campfire-glow {
            position: fixed;
            bottom: -30vh;
            left: 50%;
            width: 150vw;
            height: 100vh;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at bottom center, rgba(255, 100, 0, 0.25) 0%, rgba(200, 30, 0, 0.1) 40%, transparent 75%);
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
            animation: firePulse 5s infinite alternate ease-in-out;
        }

        @keyframes firePulse {
            0% {
                opacity: 0.8;
                transform: translateX(-50%) scale(0.95);
            }

            50% {
                opacity: 1.0;
                transform: translateX(-50%) scale(1.0);
            }

            100% {
                opacity: 0.85;
                transform: translateX(-50%) scale(1.02);
            }
        }
    </style>
    <script src="prices.js" onerror="console.log('Bot prices not found, falling back to local defaults.')"></script>
</head>

            { n: "Key of Terror", c: "material", fg: { min: 2, max: 5 }, src: "d2jsp", a: ["tkey", "terror key", "countess key"] },

            { n: "Charged Essence of Hatred", c: "material", fg: { min: 1, max: 3 }, src: "d2jsp", a: ["yellow essence", "hatred", "mephisto essence"] },

            // Worldstone Shards
            { n: "Western Worldstone Shard", c: "material", fg: { min: 10, max: 30 }, src: "d2jsp", a: ["western shard"] },

            { n: "Southern Worldstone Shard", c: "material", fg: { min: 10, max: 30 }, src: "d2jsp", a: ["southern shard"] },
            { n: "Deep Worldstone Shard", c: "material", fg: { min: 10, max: 30 }, src: "d2jsp", a: ["deep shard"] },
            { n: "Northern Worldstone Shard", c: "material", fg: { min: 10, max: 30 }, src: "d2jsp", a: ["northern shard"] },

            // Sunder Charms (Latent)
            { n: "Latent Bone Break", c: "charm", fg: { min: 10, max: 20 }, src: "d2jsp", a: ["latent bone", "latent phys sunder"] },
            { n: "Latent Cold Rupture", c: "charm", fg: { min: 10, max: 20 }, src: "d2jsp", a: ["latent cold", "latent cold sunder"] },
            { n: "Latent Crack of the Heavens", c: "charm", fg: { min: 10, max: 30 }, src: "d2jsp", a: ["latent crack", "latent light sunder"] },
            { n: "Latent Flame Rift", c: "charm", fg: { min: 10, max: 20 }, src: "d2jsp", a: ["latent flame", "latent fire sunder"] },
            { n: "Latent Rotting Fissure", c: "charm", fg: { min: 10, max: 20 }, src: "d2jsp", a: ["latent rotting", "latent poison sunder"] },
            { n: "Latent Black Cleft", c: "charm", fg: { min: 10, max: 20 }, src: "d2jsp", a: ["latent black", "latent magic sunder"] },

            // Sunder Charms (Renewed)
            { n: "Renewed Bone Break", c: "charm", fg: { min: 500, max: 8000 }, src: "d2jsp", a: ["renewed bone", "renewed phys sunder"] },
            { n: "Renewed Cold Rupture", c: "charm", fg: { min: 300, max: 2500 }, src: "d2jsp", a: ["renewed cold", "renewed cold sunder"] },
            { n: "Renewed Crack of the Heavens", c: "charm", fg: { min: 500, max: 17000 }, src: "d2jsp", a: ["renewed crack", "renewed light sunder"] },
            { n: "Renewed Flame Rift", c: "charm", fg: { min: 300, max: 6000 }, src: "d2jsp", a: ["renewed flame", "renewed fire sunder"] },
            { n: "Renewed Rotting Fissure", c: "charm", fg: { min: 300, max: 20000 }, src: "d2jsp", a: ["renewed rotting", "renewed poison sunder"] },
            { n: "Renewed Black Cleft", c: "charm", fg: { min: 300, max: 5000 }, src: "d2jsp", a: ["renewed black", "renewed magic sunder"] },

            // Fallback Runes (just in case the dynamic rune fetch also fails)
            { n: "Jah Rune", c: "rune", fg: { min: 55, max: 60 }, src: "d2jsp", p: "rune/jah-price" },
            { n: "Ber Rune", c: "rune", fg: { min: 50, max: 55 }, src: "d2jsp", p: "rune/ber-price" },
            { n: "Ist Rune", c: "rune", fg: { min: 8, max: 10 }, src: "d2jsp", p: "rune/ist-price" },
            { n: "Lo Rune", c: "rune", fg: { min: 25, max: 30 }, src: "d2jsp", p: "rune/lo-price" },
            { n: "Ohm Rune", c: "rune", fg: { min: 20, max: 25 }, src: "d2jsp", p: "rune/ohm-price" },
            { n: "Sur Rune", c: "rune", fg: { min: 25, max: 28 }, src: "d2jsp", p: "rune/sur-price" }
        ];

        // ── STATIC CATALOG ──
        let ITEMS = [...RUNES, ...FALLBACK_ITEMS];
        // Deduplicate by name
        ITEMS = [...new Map(ITEMS.map(i => [i.n, i])).values()];

        async function loadCatalog() {
            const statusEl = document.getElementById('catalogStatus');
            document.getElementById('catalogLoading').style.display = 'none';
            const wrap = document.getElementById('searchWrap');
            wrap.classList.remove('hidden');
            wrap.classList.add('reveal');
            statusEl.style.display = 'block';
            statusEl.textContent = ITEMS.length + ' base items loaded';
            setTimeout(() => statusEl.style.opacity = '0', 3000);
        }

        // ── PRICE FETCHING ──
        async function fetchPagePrice(itemPath, item) {
            // First: check if our Github Action bot scraped this item today
            if (item && window.D2TRADER_CACHED_PRICES && window.D2TRADER_CACHED_PRICES[item.n]) {
                return { ...window.D2TRADER_CACHED_PRICES[item.n], fallback: 'verified_bot' };
            }

            // Second: Local fallback data embedded in item
            if (item && item.fg) {
                return { ...item.fg, fallback: 'embedded' };
            }

            // No price found
            throw new Error('Price currently unavailable for this item');
        }

        function formatRune(val, name) {
            if (val >= 100) return Math.round(val) + ' ' + name;
            if (val >= 10) return val.toFixed(1).replace(/\.0$/, '') + ' ' + name;
            if (val >= 1) return val.toFixed(1).replace(/\.0$/, '') + ' ' + name;
            if (val >= 0.1) return val.toFixed(2).replace(/0$/, '') + ' ' + name;
            return val.toFixed(2) + ' ' + name;
        }

        async function lookupPrice(item) {
            const card = document.getElementById('priceCard');
            card.className = 'price-card show';
            card.innerHTML = '<div class="loading"><div class="spinner"></div><div>Fetching real-time prices...</div></div>';
            try {
                const jahItem = ITEMS.find(i => i.n === 'Jah Rune');
                const istItem = ITEMS.find(i => i.n === 'Ist Rune');
                if (!jahItem || !istItem) throw new Error('Rune reference data not available');

                let itemPrice, jahPrice, istPrice, source, fallbackType = null;

                [itemPrice, jahPrice, istPrice] = await Promise.all([
                    fetchPagePrice(item.p, item),
                    fetchPagePrice(jahItem.p, jahItem),
                    fetchPagePrice(istItem.p, istItem)
                ]);

                if (itemPrice.fallback === 'embedded') {
                    source = 'd2jsp';
                } else {
                    source = 'd2trader';
                }

                // Track fallback type from item price
                fallbackType = itemPrice.fallback || null;

                // Median (midpoint of min/max)
                const itemMed = (itemPrice.min + itemPrice.max) / 2;
                const jahMed = (jahPrice.min + jahPrice.max) / 2;
                const istMed = (istPrice.min + istPrice.max) / 2;
                // Median rune values
                const inJah = jahMed > 0 ? itemMed / jahMed : 0;
                const inIst = istMed > 0 ? itemMed / istMed : 0;
                // Range rune values
                const istLow = istMed > 0 ? itemPrice.min / istMed : 0;
                const istHigh = istMed > 0 ? itemPrice.max / istMed : 0;
                const jahLow = jahMed > 0 ? itemPrice.min / jahMed : 0;
                const jahHigh = jahMed > 0 ? itemPrice.max / jahMed : 0;
                let primaryVal, primaryLabel, primaryClass;
                if (inJah >= 0.8) {
                    primaryVal = formatRune(inJah, 'Jah');
                    primaryLabel = 'Median Value in Jah Runes';
                    primaryClass = 'jah-val';
                } else {
                    primaryVal = formatRune(inIst, 'Ist');
                    primaryLabel = 'Median Value in Ist Runes';
                    primaryClass = 'ist-val';
                }
                const fmtR = (v) => v >= 100 ? Math.round(v) : v >= 1 ? v.toFixed(1).replace(/\.0$/, '') : v.toFixed(2).replace(/0$/, '');
                const istRange = istLow === istHigh ? fmtR(istLow) : fmtR(istLow) + ' – ' + fmtR(istHigh);
                const jahRange = jahLow === jahHigh ? fmtR(jahLow) : fmtR(jahLow) + ' – ' + fmtR(jahHigh);
                const fgRange = itemPrice.min === itemPrice.max ? itemPrice.min + ' FG' : itemPrice.min + ' – ' + itemPrice.max + ' FG';

                // Build source badge based on fallback type
                let srcBadge = '';
                if (fallbackType === 'verified_bot') {
                    srcBadge = '<div style="text-align:center;margin-top:8px;padding:6px 12px;border-radius:8px;background:rgba(0, 255, 0, 0.08);border:1px solid rgba(0, 255, 0, 0.2);font-size:0.7rem;color:#00ff00;letter-spacing:0.5px">🤖 Verified perfectly accurate by daily bot refresh</div>';
                } else if (fallbackType === 'ladder') {
                    srcBadge = '<div style="text-align:center;margin-top:8px;padding:6px 12px;border-radius:8px;background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.2);font-size:0.7rem;color:#4ecdc4;letter-spacing:0.5px">⚡ Ladder price shown — non-ladder data unavailable</div>';
                } else if (fallbackType === 'embedded') {
                    srcBadge = '<div style="text-align:center;margin-top:8px;padding:6px 12px;border-radius:8px;background:rgba(255,180,60,0.08);border:1px solid rgba(255,180,60,0.2);font-size:0.7rem;color:#ffb43c;letter-spacing:0.5px">📊 Estimated from recent d2jsp trades</div>';
                } else if (source === 'd2jsp') {
                    srcBadge = '<div style="text-align:center;margin-top:6px;font-size:0.65rem;color:#a09880;letter-spacing:1px">📊 FG range from d2jsp trades · Rune rates from d2trader.net</div>';
                }

                card.innerHTML = `
      <div class="item-header">
        <div class="item-name">${item.n}</div>
        <div class="item-type">${item.c}${source === 'd2jsp' ? ' · <span style="color:#f0c060">Season 9</span>' : ''}${fallbackType ? ' · <span style="color:#ffb43c">Estimated</span>' : ''}</div>
      </div>
      <div class="primary-rune">
        <div class="price-label">${primaryLabel}</div>
        <div class="price-value ${primaryClass}">${primaryVal}</div>
      </div>
      <div class="price-grid">
        <div class="price-box ist">
          <div class="price-label">In Ist Runes</div>
          <div class="price-value ist-val">${formatRune(inIst, '')}</div>
          <div style="font-size:0.65rem;color:#a09880;margin-top:4px">Range: ${istRange}</div>
        </div>
        <div class="price-box jah">
          <div class="price-label">In Jah Runes</div>
          <div class="price-value jah-val">${formatRune(inJah, '')}</div>
          <div style="font-size:0.65rem;color:#a09880;margin-top:4px">Range: ${jahRange}</div>
        </div>
      </div>
      <div class="fg-section">
        <div class="fg-label">Forum Gold (FG) Value</div>
        <div class="fg-value">${fmtR(itemMed)} FG</div>
        <div style="font-size:0.7rem;color:#a09880;margin-top:4px">Range: ${fgRange}</div>
      </div>
      <div class="rates-bar">
        <span>1 Jah = ${jahPrice.min}–${jahPrice.max} FG</span>
        <span>·</span>
        <span>1 Ist = ${istPrice.min}–${istPrice.max} FG</span>
      </div>
      <div style="text-align:center;margin-top:10px;font-size:0.7rem">
        ${source === 'd2jsp'
                        ? `<a href="https://forums.d2jsp.org/forum.php?f=268" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">🔗 Verify on d2jsp forums</a>`
                        : `<a href="https://d2trader.net/${item.p}" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">🔗 Verify on d2trader.net</a>`
                    }
        <span style="color:#555;margin:0 6px">·</span>
        <a href="https://d2trader.net/rune/jah-price" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">Jah price</a>
        <span style="color:#555;margin:0 6px">·</span>
        <a href="https://d2trader.net/rune/ist-price" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;opacity:0.7">Ist price</a>
      </div>
      ${srcBadge}`;
                // Update footer with real fetch timestamp
                const now = new Date();
                const ts = now.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
                document.getElementById('footerInfo').innerHTML = `Prices sourced from d2trader.net (d2jsp FG) · Last updated: ${ts}`;
            } catch (err) {
                card.innerHTML = `<div class="error-msg">⚠️ ${err.message}<br><small>Try again in a moment — the proxy may be rate-limited.</small></div>`;
            }
        }

        // ── SEARCH ──
        const input = document.getElementById('searchInput');
        const dropdown = document.getElementById('dropdown');
        let selectedIndex = -1;

        function updateSelection(items) {
            items.forEach((item, idx) => {
                if (idx === selectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function searchItems(query) {
            if (!query || query.length < 1) return [];
            const q = query.toLowerCase();
            return ITEMS.filter(item => {
                if (item.n.toLowerCase().includes(q)) return true;
                if (item.a && item.a.some(a => a.toLowerCase().includes(q))) return true;
                return false;
            }).slice(0, 15);
        }

        function renderDropdown(results) {
            selectedIndex = -1;
            if (results.length === 0) { dropdown.classList.remove('show'); return; }
            dropdown.innerHTML = results.map((item, i) =>
                `<div class="result-item" data-idx="${i}">
      <span class="result-name">${item.n}</span>
      <span class="result-cat cat-${item.c}">${item.c}</span>
    </div>`
            ).join('');
            dropdown.classList.add('show');
            dropdown.querySelectorAll('.result-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    input.value = results[idx].n;
                    dropdown.classList.remove('show');
                    lookupPrice(results[idx]);
                });
            });
        }

        input.addEventListener('input', () => renderDropdown(searchItems(input.value.trim())));
        input.addEventListener('keydown', (e) => {
            const items = dropdown.querySelectorAll('.result-item');
            if (e.key === 'Escape') dropdown.classList.remove('show');

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (dropdown.classList.contains('show') && items.length > 0) {
                    selectedIndex = (selectedIndex + 1) % items.length;
                    updateSelection(items);
                }
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (dropdown.classList.contains('show') && items.length > 0) {
                    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                    updateSelection(items);
                }
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                const results = searchItems(input.value.trim());
                if (results.length > 0) {
                    const idxToUse = selectedIndex >= 0 ? selectedIndex : 0;
                    input.value = results[idxToUse].n;
                    dropdown.classList.remove('show');
                    lookupPrice(results[idxToUse]);
                }
            }
        });
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) dropdown.classList.remove('show'); });
        // ── CAMPFIRE PARTICLES & GLOW ──
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Ambient dust
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 1.5 + 0.5, speedY: -(Math.random() * 0.2 + 0.05),
                speedX: (Math.random() - 0.5) * 0.3, opacity: Math.random() * 0.3 + 0.1,
                color: '255,140,0', type: 'dust'
            });
        }
        // Campfire embers
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: canvas.width / 2 + (Math.random() - 0.5) * 400,
                y: canvas.height + Math.random() * 100,
                size: Math.random() * 3.5 + 1.0, speedY: -(Math.random() * 1.0 + 0.3),
                speedX: (Math.random() - 0.5) * 0.8, opacity: Math.random() * 0.7 + 0.3,
                color: Math.random() > 0.5 ? '255,140,0' : '255,50,10', type: 'ember'
            });
        }

        let glowPhase = 0;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Base glow removed from canvas to prevent 8-bit banding artifacts 
            // The glow is now handled smoothly by the hardware-accelerated CSS .campfire-glow

            particles.forEach(p => {
                p.y += p.speedY; p.x += p.speedX;
                p.opacity -= (p.type === 'ember') ? 0.003 : 0.001;

                if (p.y < 0 || p.opacity <= 0) {
                    if (p.type === 'ember') {
                        p.x = canvas.width / 2 + (Math.random() - 0.5) * 300;
                        p.y = canvas.height + 10;
                        p.opacity = Math.random() * 0.6 + 0.2;
                    } else {
                        p.x = Math.random() * canvas.width;
                        p.y = canvas.height + 10;
                        p.opacity = Math.random() * 0.3 + 0.1;
                    }
                }
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color},${p.opacity})`; ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // ── INIT ──
        loadCatalog();
    </script>
</body>
